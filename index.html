    <!-- Install an extension (better comments) to better visualize the page's notes. -->

    * I t will have some partitions/sections to it which would make up the few parts of the system.

    <!--

    -->
    <section class="home" >

            <!-- * Airline Logo -->
            <div class="logo">
                <h1>
                    <!-- todo: add a airplane logo -->

            </div>
            <div class="navbar">
                <nav class="nav">
                    <ul>
                        <li>
                            <a href="#home">Home</a>
                        </li>
                        <li>
                            <a href="#About">About</a>
                        </li>
                        <li>

                        </li>

                        </li>
                    </ul>
                </nav>
            </div>
            <!--

                        <a href="https://github.com/Kiruicompyu/Fliama">

                    </li>
                </ul>
            </div>

    <!-- * About Section
        - This is the section that will contain any info about our organisation that might be relevant to our users.

        <!-- Should contain a few cards with info about our organisation in a precise foramat.
                side note: the cards should take the samwe styles.

        -->
        <!-- ^ How about adding it using javascript since it just replicates and would use the same styles...akili mti yangu 😂 -->

    </section>

    <!-- * Contact section *
        ^ this page should contain a minimalistic page where users can submit their contact info and reach out to the site admins.
        ^ I am thinking of moving the whole contact page into a new html page 
    -->
    <section id="contact">
        <!-- Simple form with two fieldsets  -->
        <form action="" method="post">
            <fieldset class="inputs" >
                <legend>Contact Us</legend>
                <div>
                    <label for="fname">First Name</label>
                    <input type="text" name="fname" id="fname" placeholder="Please enter your first name here: ">
                </div>
                <div>
                    <label for="name">Surname</label>
                    <input type="text" name="sname" id="sname" placeholder="Please enter your surname here: ">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Please enter your email here: ">
                </div>
                <div>
                    <!-- ^ actual place to input the message. -->
                    <textarea name="message" id="message" cols="30" rows="10" placeholder="Enter your comment(s) here...."></textarea>
                </div>
            </fieldset>
            <fieldset class="button">
                <button type="submit" id="submit-btn">Submit</button>
            </fieldset>
        </form>
    </section>

<script src="script.js"></script>
